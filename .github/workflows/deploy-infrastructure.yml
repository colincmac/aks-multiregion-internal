name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: 'Environment name prefix for all resource names'
        required: true
        default: 'istio-mesh'
      location:
        description: 'Azure region for the subscription-scoped deployment metadata'
        required: true
        default: 'eastus'
      what_if:
        description: 'Run what-if (dry-run) instead of a full deployment'
        type: boolean
        default: false

  pull_request:
    paths:
      - 'infra/**'

permissions:
  id-token: write   # Required for OIDC authentication with Azure
  contents: read

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep template
        run: |
          az deployment sub validate \
            --location "${{ github.event.inputs.location || 'eastus' }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName="${{ github.event.inputs.environment_name || 'istio-mesh-validate' }}"

  what-if:
    name: What-If
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: What-If
        run: |
          az deployment sub what-if \
            --location "${{ inputs.location }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName="${{ inputs.environment_name }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: what-if
    if: github.event_name == 'workflow_dispatch' && inputs.what_if == false
    environment: azure
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Register required resource providers
        run: |
          for provider in Microsoft.ContainerService Microsoft.KubernetesConfiguration Microsoft.Network; do
            state=$(az provider show --namespace "$provider" --query "registrationState" -o tsv)
            if [ "$state" != "Registered" ]; then
              echo "Registering $provider..."
              az provider register --namespace "$provider" --wait
            else
              echo "$provider — already registered"
            fi
          done

      - name: Deploy infrastructure
        run: |
          az deployment sub create \
            --name "aks-multi-region-$(date +%Y%m%d%H%M%S)" \
            --location "${{ inputs.location }}" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters environmentName="${{ inputs.environment_name }}" \
            --verbose
