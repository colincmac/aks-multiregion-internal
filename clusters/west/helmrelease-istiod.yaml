apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-base
    - name: istio-cni
  chart:
    spec:
      chart: istiod
      version: "1.29.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    profile: ambient
    global:
      meshID: shared-mesh
      network: network-west
    multiCluster:
      clusterName: cluster-west
    env:
      AMBIENT_ENABLE_MULTI_NETWORK: "true"
      AMBIENT_ENABLE_BAGGAGE: "true"
