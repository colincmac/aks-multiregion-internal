apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-base
    - name: istio-cni
  chart:
    spec:
      chart: istiod
      version: "1.23.*"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    profile: ambient
    global:
      meshID: shared-mesh
      multiCluster:
        clusterName: cluster-west
      network: network-west
    pilot:
      env:
        AMBIENT_ENABLE_MULTI_NETWORK: "true"
