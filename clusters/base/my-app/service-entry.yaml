# =============================================================================
# Testable external service failover using httpbin.org
#
# Both "regional" endpoints point to httpbin.org for testing. Locality labels
# make Istio prefer the endpoint matching the local cluster's identity.
#
# Testing failover:
#   1. Normal: traffic routes to the local-locality endpoint (both are httpbin.org)
#   2. Simulate regional failure: change the local endpoint address to a
#      non-routable IP (e.g. 192.0.2.1) — outlier detection will eject it
#      and failover to the remote endpoint
#
# Verify which endpoint was selected:
#   kubectl exec <pod> -- curl -s http://httpbin.org/anything/test
#   # Check waypoint access logs for UPSTREAM_HOST:
#   kubectl logs -n istio-egress -l gateway.networking.k8s.io/gateway-name=egress-gateway -c istio-proxy
# =============================================================================
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: httpbin-ext
  namespace: my-app
  labels:
    istio.io/use-waypoint-namespace: istio-egress
    istio.io/use-waypoint: egress-gateway
spec:
  hosts:
    - httpbin.org
  location: MESH_EXTERNAL
  ports:
    - number: 80
      name: http
      protocol: HTTP
  resolution: DNS
  endpoints:
    # Both point to httpbin.org for testing. To simulate east failure,
    # change this address to 192.0.2.1 (non-routable TEST-NET).
    - address: httpbin.org
      locality: eastus2
      labels:
        topology.istio.io/cluster: cluster-east
    - address: httpbin.org
      locality: centralus
      labels:
        topology.istio.io/cluster: cluster-west
  exportTo:
    - "."
---
# HTTPRoute: rewrites to /anything/ so httpbin echoes back full request details.
# Path rewriting happens BEFORE endpoint selection — you cannot vary the path
# per endpoint. Use waypoint access logs to see which endpoint was chosen.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-ext
  namespace: my-app
spec:
  parentRefs:
    - kind: ServiceEntry
      group: networking.istio.io
      name: httpbin-ext
  rules:
    - timeouts:
        request: 3s
        backendRequest: 2s
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /anything/
      backendRefs:
        - kind: Hostname
          group: networking.istio.io
          name: httpbin.org
          port: 80
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: httpbin-ext-dr
  namespace: my-app
spec:
  host: httpbin.org
  trafficPolicy:
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
    loadBalancer:
      simple: ROUND_ROBIN
      localityLbSetting:
        enabled: true
        failoverPriority:
          - topology.istio.io/cluster