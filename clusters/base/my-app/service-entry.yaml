# =============================================================================
# Active-active external SaaS downstream — reference pattern.
#
# Previously this ServiceEntry had *both* locality endpoints pointing at
# `httpbin.org`, which cannot demonstrate real locality-based failover.
# This version models two **distinct** regional public endpoints:
#   * cluster-east  → httpbin.org        (the "US" endpoint)
#   * cluster-west  → eu.httpbin.org     (the "EU" endpoint)
# Both hostnames are reachable for demo purposes; swapping one address to a
# non-routable IP (e.g. 192.0.2.1) forces outlier detection to eject the
# local endpoint and fail over to the remote one.
#
# Note on "fully private" posture: this demo calls the public internet. For
# fully-private environments substitute two private regional endpoints (e.g.
# an Azure PaaS paired-region FQDN, or two internal services fronted by
# Azure Private Link) and keep the same locality-labelled endpoints shape.
#
# Testing failover:
#   kubectl exec <pod> -n my-app -- curl -s http://httpbin.org/anything/test
#   # Check sidecar access logs for UPSTREAM_HOST to see which endpoint served.
# =============================================================================
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: httpbin-ext
  namespace: my-app
spec:
  hosts:
    - httpbin.org
  location: MESH_EXTERNAL
  ports:
    - number: 80
      name: http
      protocol: HTTP
  resolution: DNS
  endpoints:
    - address: httpbin.org
      locality: cluster-east
      labels:
        topology.istio.io/cluster: cluster-east
    - address: eu.httpbin.org
      locality: cluster-west
      labels:
        topology.istio.io/cluster: cluster-west
  exportTo:
    - "."
---
# HTTPRoute: rewrites to /anything/ so httpbin echoes back full request details.
# Path rewriting happens BEFORE endpoint selection — you cannot vary the path
# per endpoint. Use sidecar proxy access logs to see which endpoint was chosen.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-ext
  namespace: my-app
spec:
  parentRefs:
    - kind: ServiceEntry
      group: networking.istio.io
      name: httpbin-ext
  rules:
    - timeouts:
        request: 3s
        backendRequest: 2s
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /anything/
      backendRefs:
        - kind: Hostname
          group: networking.istio.io
          name: httpbin.org
          port: 80
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: httpbin-ext-dr
  namespace: my-app
spec:
  host: httpbin.org
  trafficPolicy:
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 100
    loadBalancer:
      simple: ROUND_ROBIN
      localityLbSetting:
        enabled: true
        failoverPriority:
          - topology.istio.io/cluster
