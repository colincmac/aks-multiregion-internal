# =============================================================================
# my-api-backend — the downstream service that my-api calls.
#
# Also podinfo. Both clusters run the backend (active-active), and the
# frontend's DestinationRule uses locality-aware load balancing with
# `failoverPriority: [topology.istio.io/cluster]` so each cluster's frontend
# prefers its local backend and fails over cross-cluster only on error.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-api-backend
  namespace: my-app
  labels:
    app: my-api-backend
    app.kubernetes.io/name: my-api-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: my-app
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: my-api-backend
  template:
    metadata:
      labels:
        app: my-api-backend
        app.kubernetes.io/name: my-api-backend
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9898"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: my-api-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 57000
        runAsGroup: 57000
        fsGroup: 57000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: my-api-backend
      containers:
        - name: podinfod
          image: ghcr.io/stefanprodan/podinfo:6.7.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
              protocol: TCP
            - name: http-metrics
              containerPort: 9797
              protocol: TCP
          command:
            - ./podinfo
            - --port=9898
            - --port-metrics=9797
            - --level=info
            - --random-delay=false
            - --random-error=false
          env:
            - name: PODINFO_UI_COLOR
              value: "#0f766e"
            # Patched per-cluster by the overlay to show which region served.
            - name: PODINFO_UI_MESSAGE
              value: "my-api-backend (cluster unknown)"
          livenessProbe:
            exec:
              command:
                - podcli
                - check
                - http
                - localhost:9898/healthz
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - podcli
                - check
                - http
                - localhost:9898/readyz
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: my-api-backend
  namespace: my-app
  labels:
    app: my-api-backend
    # Mirrors the convention used on the frontend Service so operators can
    # filter "global" services across clusters with a single label.
    istio.io/global: "true"
spec:
  selector:
    app: my-api-backend
  ports:
    - name: http
      port: 8080
      targetPort: 9898
      appProtocol: http
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: my-api-backend-dr
  namespace: my-app
spec:
  host: my-api-backend.my-app.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 5s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    loadBalancer:
      simple: ROUND_ROBIN
      localityLbSetting:
        enabled: true
        failoverPriority:
          - topology.istio.io/cluster
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: my-api-backend
  namespace: my-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: my-api-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: my-api-backend
  namespace: my-app
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: my-api-backend
