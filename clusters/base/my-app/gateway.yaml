apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: internal-api-gateway
  namespace: my-app
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: internal-api-cert
      hosts:
        - "api.internal.contoso.com"
