apiVersion: v1
kind: Service
metadata:
  name: my-api
  namespace: my-app
  labels:
    app: my-api
    istio.io/global: "true"
spec:
  selector:
    app: my-api
  ports:
    - name: http
      port: 8080
      targetPort: 9898
      appProtocol: http
    - name: grpc
      port: 9999
      targetPort: 9999
      appProtocol: grpc
