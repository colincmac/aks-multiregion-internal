apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-api-route
  namespace: my-app
spec:
  parentRefs:
    - name: internal-api-gateway
  hostnames:
    - "api.internal.contoso.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: my-api
          port: 8080
