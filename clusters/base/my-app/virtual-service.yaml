apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-api-route
  namespace: my-app
spec:
  parentRefs:
    - name: internal-api-gateway
  hostnames:
    - "api.internal.contoso.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        # Overall request timeout and per-try backend budget. With the Istio
        # retry policy below (attached via VirtualService in traffic-mgmt/),
        # this leaves room for 2 retries within the overall request budget.
        request: 5s
        backendRequest: 2s
      backendRefs:
        - name: my-api
          port: 8080
