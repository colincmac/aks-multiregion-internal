apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: my-api-dr
  namespace: my-app
spec:
  host: my-api.my-app.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
    outlierDetection:
      # Tight outlier detection so a single failing instance is ejected quickly.
      # Tune per-service if flappy services over-eject.
      consecutive5xxErrors: 1
      interval: 1s
      baseEjectionTime: 1m
      maxEjectionPercent: 50
    loadBalancer:
      simple: ROUND_ROBIN
      localityLbSetting:
        enabled: true
        # Prefer pods in the same cluster; only fail over to other clusters
        # when local endpoints are unhealthy. This is the core of the
        # active-active duplicate-service pattern.
        failoverPriority:
          - topology.istio.io/cluster
