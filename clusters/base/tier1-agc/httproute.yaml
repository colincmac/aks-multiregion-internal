# Tier-1 -> Tier-2: forward api.internal.contoso.com to the regional Istio
# ingress gateway. AGC performs backend health probing against the Tier-2
# Service directly, independently of the DNS GSLB layer.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tier1-to-tier2
  namespace: tier1-agc
spec:
  parentRefs:
    - name: tier1-agc
      namespace: tier1-agc
  hostnames:
    - "api.internal.contoso.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: istio-ingressgateway
          namespace: istio-system
          port: 443
          weight: 100
---
# Cross-namespace backendRef from tier1-agc/HTTPRoute to istio-system/Service
# is forbidden by default; this ReferenceGrant authorises it.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: tier1-agc-to-istio-ingress
  namespace: istio-system
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: tier1-agc
  to:
    - group: ""
      kind: Service
      name: istio-ingressgateway
