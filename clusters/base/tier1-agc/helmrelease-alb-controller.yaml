# ALB Controller HelmRelease.
#
# The ALB Controller reconciles Gateway API objects (Gateway, HTTPRoute,
# BackendTLSPolicy, ApplicationLoadBalancer) into the regional AGC resource.
#
# Per-region overlays (clusters/east, clusters/west) MUST patch the
# `albController.podIdentity.clientId` value with the client ID of the
# 'mi-alb-controller-<cluster>' managed identity output from aks.bicep.
# See clusters/east/agc-patch.yaml for an example.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azure-alb-controller
  namespace: azure-alb-system
spec:
  interval: 1h
  chart:
    spec:
      chart: azure-alb-controller
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: alb-controller
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    albController:
      podIdentity:
        type: workloadIdentity
        # Replace with the clientId of 'mi-alb-controller-<cluster>' from aks.bicep output.
        # Patched by the per-region overlay (clusters/{east,west}/agc-patch.yaml).
        clientId: PLACEHOLDER_ALB_CONTROLLER_CLIENT_ID
