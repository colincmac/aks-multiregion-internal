apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
        # Required for Azure Workload Identity webhook injection
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: external-dns
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-dns
          # Use the latest stable release; pin to a digest in production.
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --source=service
            - --provider=azure-private-dns
            # Per-cluster values are overridden via Kustomize patches in
            # clusters/east/ and clusters/west/ overlays:
            #   --azure-resource-group
            #   --azure-subscription-id
            #   --txt-owner-id
            - --azure-resource-group=rg-istio-mesh-global
            - --azure-subscription-id=$(AZURE_SUBSCRIPTION_ID)
            - --domain-filter=internal.contoso.com
            - --policy=sync
            - --registry=txt
            - --txt-owner-id=cluster-default
            - --txt-prefix=externaldns-
            - --interval=10s
            - --log-level=info
            - --log-format=json
          env:
            - name: AZURE_SUBSCRIPTION_ID
              valueFrom:
                secretKeyRef:
                  name: external-dns-azure
                  key: subscription-id
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes: []
