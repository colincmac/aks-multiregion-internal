apiVersion: v1
kind: ConfigMap
metadata:
  name: health-check-config
  namespace: health-check
data:
  # ---------------------------------------------------------------------------
  # Tunable parameters — override via Kustomize patch in per-cluster overlays
  # ---------------------------------------------------------------------------
  # Primary probe: direct backend workload (bypasses gateway, detects workload failure)
  PROBE_TARGET: "http://my-api.my-app.svc.cluster.local:8080/"
  # Secondary probe: ingress gateway health endpoint (detects gateway-tier failure).
  # Istio gateway exposes /healthz/ready on port 15021. Both probes must pass
  # for DNS to be registered — implements a two-tier GSLB health check so that
  # a failed gateway (even with healthy workloads) causes DNS deregistration.
  GATEWAY_PROBE_TARGET: "http://istio-ingressgateway.istio-system.svc.cluster.local:15021/healthz/ready"
  # Tier-1 (AGC) gateway and namespace for the controller to read frontend IP.
  # When the Gateway object exists and has an address, the controller probes the
  # AGC frontend over HTTPS and uses its IP as the ExternalDNS A-record target.
  # Set to empty strings to disable Tier-1 integration (e.g., before AGC is deployed).
  TIER1_GATEWAY_NAME: "tier1-agc"
  TIER1_GATEWAY_NAMESPACE: "tier1-agc"
  PROBE_INTERVAL: "5"
  FAIL_THRESHOLD: "3"
  RECOVER_THRESHOLD: "2"
  PROBE_TIMEOUT: "3"
  DNS_SERVICE_NAME: "api-dns-record"
  DNS_SERVICE_NAMESPACE: "health-check"
  HTTP_PORT: "8080"

  # ---------------------------------------------------------------------------
  # dns-service.yaml — fallback template used when no Tier-1 AGC frontend IP
  # is available. Points ExternalDNS at the Tier-2 Istio ingress gateway ILB.
  # When the AGC Gateway has an address, the controller generates the service
  # dynamically with the AGC frontend IP as the external-dns target annotation.
  # ---------------------------------------------------------------------------
  dns-service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: api-dns-record
      namespace: health-check
      annotations:
        external-dns.alpha.kubernetes.io/hostname: api.internal.contoso.com
        external-dns.alpha.kubernetes.io/ttl: "30"
    spec:
      type: ExternalName
      externalName: istio-ingressgateway.istio-system.svc.cluster.local

  # ---------------------------------------------------------------------------
  # controller.sh — the main health-check loop.
  # Implements three-tier GSLB health checking:
  #   Tier 0 (AGC/Tier-1): probes the AGC private frontend via HTTPS.
  #                         Frontend IP is discovered dynamically from the
  #                         Gateway status. When available, the DNS A-record
  #                         target is also switched to the AGC frontend IP
  #                         (per ADR-0001 Option E).
  #   Tier 1 (backend):     direct workload probe, detects workload failure.
  #   Tier 2 (gateway):     Istio ingress gateway /healthz/ready probe.
  # DNS is only registered when ALL active tiers are healthy.
  # Runs as PID 1 alongside a lightweight HTTP server (served by Python).
  # ---------------------------------------------------------------------------
  controller.sh: |
    #!/bin/sh
    set -eu

    PROBE_TARGET="${PROBE_TARGET:-http://my-api.my-app.svc.cluster.local:8080/}"
    GATEWAY_PROBE_TARGET="${GATEWAY_PROBE_TARGET:-}"
    TIER1_GATEWAY_NAME="${TIER1_GATEWAY_NAME:-}"
    TIER1_GATEWAY_NAMESPACE="${TIER1_GATEWAY_NAMESPACE:-}"
    PROBE_INTERVAL="${PROBE_INTERVAL:-5}"
    FAIL_THRESHOLD="${FAIL_THRESHOLD:-3}"
    RECOVER_THRESHOLD="${RECOVER_THRESHOLD:-2}"
    PROBE_TIMEOUT="${PROBE_TIMEOUT:-3}"
    DNS_SERVICE_NAME="${DNS_SERVICE_NAME:-api-dns-record}"
    DNS_SERVICE_NAMESPACE="${DNS_SERVICE_NAMESPACE:-health-check}"
    STATUS_FILE="/tmp/health-status"
    DNS_SERVICE_FILE="/config/dns-service.yaml"
    AGC_DNS_SERVICE_FILE="/tmp/dns-service-agc.yaml"

    consecutive_failures=0
    consecutive_successes=0
    # Start in unknown/unhealthy state; require RECOVER_THRESHOLD successful probes
    # before publishing the DNS record. This avoids registering DNS for a backend
    # that is already down at controller startup.
    is_healthy=false

    # Write initial status
    echo "STARTING" > "${STATUS_FILE}"

    # get_agc_frontend_ip: reads the AGC private frontend IP from the Gateway
    # status. Returns empty string if the Gateway is not present or has no
    # address assigned yet.
    get_agc_frontend_ip() {
      if [ -z "${TIER1_GATEWAY_NAME}" ] || [ -z "${TIER1_GATEWAY_NAMESPACE}" ]; then
        echo ""
        return 0
      fi
      kubectl get gateway "${TIER1_GATEWAY_NAME}" \
        -n "${TIER1_GATEWAY_NAMESPACE}" \
        -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo ""
    }

    # build_agc_dns_service: writes a headless Service manifest whose
    # external-dns.alpha.kubernetes.io/target annotation is the AGC frontend IP.
    # ExternalDNS uses this annotation value directly as the A-record target.
    build_agc_dns_service() {
      local agc_ip="${1}"
      cat > "${AGC_DNS_SERVICE_FILE}" <<EOF
    apiVersion: v1
    kind: Service
    metadata:
      name: ${DNS_SERVICE_NAME}
      namespace: ${DNS_SERVICE_NAMESPACE}
      annotations:
        external-dns.alpha.kubernetes.io/hostname: api.internal.contoso.com
        external-dns.alpha.kubernetes.io/ttl: "30"
        external-dns.alpha.kubernetes.io/target: "${agc_ip}"
    spec:
      type: ClusterIP
      clusterIP: None
      selector: {}
    EOF
    }

    apply_dns_service() {
      local agc_ip
      agc_ip=$(get_agc_frontend_ip)
      if [ -n "${agc_ip}" ]; then
        echo "[controller] Applying DNS service with AGC frontend IP ${agc_ip}"
        build_agc_dns_service "${agc_ip}"
        if ! kubectl apply -f "${AGC_DNS_SERVICE_FILE}"; then
          echo "[controller] ERROR: Failed to apply AGC DNS service — check RBAC permissions"
          return 1
        fi
      else
        echo "[controller] Applying DNS service (Tier-2 ILB fallback — AGC not yet available)"
        if ! kubectl apply -f "${DNS_SERVICE_FILE}"; then
          echo "[controller] ERROR: Failed to apply DNS service — check RBAC permissions"
          return 1
        fi
      fi
      echo "OK" > "${STATUS_FILE}"
    }

    delete_dns_service() {
      local reason="${1:-unhealthy}"
      echo "[controller] Deleting DNS service (${reason})"
      if ! kubectl delete service "${DNS_SERVICE_NAME}" \
        -n "${DNS_SERVICE_NAMESPACE}" --ignore-not-found=true; then
        echo "[controller] ERROR: Failed to delete DNS service — check RBAC permissions"
        return 1
      fi
      echo "UNHEALTHY" > "${STATUS_FILE}"
    }

    # probe_tier: probe a single HTTP target; returns 0 on success, 1 on failure.
    probe_tier() {
      local target="${1}"
      local label="${2:-target}"
      if curl -sf -o /dev/null -m "${PROBE_TIMEOUT}" "${target}"; then
        return 0
      else
        echo "[controller] Probe failed (${label}): ${target}"
        return 1
      fi
    }

    # probe_agc: probe the AGC private frontend over HTTPS using the discovered IP.
    # Uses -k (insecure) because the AGC certificate is a private CA cert.
    # Returns 0 if AGC frontend is reachable, 1 otherwise.
    probe_agc() {
      local ip="${1}"
      if curl -sfk -o /dev/null -m "${PROBE_TIMEOUT}" \
           -H "Host: api.internal.contoso.com" \
           "https://${ip}/"; then
        return 0
      else
        echo "[controller] AGC Tier-1 probe failed: https://${ip}/"
        return 1
      fi
    }

    # Ensure the DNS service is absent at startup until we confirm health
    delete_dns_service "startup"

    while true; do
      # Discover AGC frontend IP (empty if AGC is not yet deployed)
      agc_ip=$(get_agc_frontend_ip)

      # AGC Tier-1 probe: only when the Gateway has an assigned address.
      tier1_ok=true
      if [ -n "${agc_ip}" ]; then
        if ! probe_agc "${agc_ip}"; then
          tier1_ok=false
        fi
      fi

      # Backend probe: direct workload (detects workload failures)
      backend_ok=true
      if ! probe_tier "${PROBE_TARGET}" "backend"; then
        backend_ok=false
      fi

      # Tier-2 gateway probe: Istio ingress gateway /healthz/ready
      # (detects gateway-tier failures independently of workload health).
      gateway_ok=true
      if [ -n "${GATEWAY_PROBE_TARGET}" ]; then
        if ! probe_tier "${GATEWAY_PROBE_TARGET}" "gateway"; then
          gateway_ok=false
        fi
      fi

      if [ "${tier1_ok}" = "true" ] && [ "${backend_ok}" = "true" ] && [ "${gateway_ok}" = "true" ]; then
        consecutive_failures=0
        consecutive_successes=$((consecutive_successes + 1))

        if [ "${is_healthy}" = "false" ] && [ "${consecutive_successes}" -ge "${RECOVER_THRESHOLD}" ]; then
          echo "[controller] All tiers healthy after ${consecutive_successes} successes — registering DNS"
          apply_dns_service
          is_healthy=true
        elif [ "${is_healthy}" = "true" ]; then
          echo "OK" > "${STATUS_FILE}"
        fi
      else
        consecutive_successes=0
        consecutive_failures=$((consecutive_failures + 1))
        echo "[controller] Probe failure ${consecutive_failures}/${FAIL_THRESHOLD} (tier1_ok=${tier1_ok} backend_ok=${backend_ok} gateway_ok=${gateway_ok})"
        if [ "${consecutive_failures}" -ge "${FAIL_THRESHOLD}" ] && [ "${is_healthy}" = "true" ]; then
          delete_dns_service "fail threshold reached"
          is_healthy=false
        fi
      fi

      sleep "${PROBE_INTERVAL}"
    done

  # ---------------------------------------------------------------------------
  # server.py — minimal HTTP server that exposes /healthz.
  # Returns 200 when status file contains "OK", 503 otherwise.
  # ---------------------------------------------------------------------------
  server.py: |
    import http.server
    import os

    STATUS_FILE = "/tmp/health-status"
    HTTP_PORT   = int(os.environ.get("HTTP_PORT", "8080"))

    class HealthHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path != "/healthz":
                self.send_response(404)
                self.end_headers()
                return
            try:
                with open(STATUS_FILE) as f:
                    status = f.read().strip()
            except FileNotFoundError:
                status = "STARTING"

            if status == "OK":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"OK\n")
            else:
                self.send_response(503)
                self.end_headers()
                self.wfile.write(f"UNHEALTHY: {status}\n".encode())

        def log_message(self, fmt, *args):
            # Suppress per-request access logs to keep output clean
            pass

    if __name__ == "__main__":
        print(f"[server] Listening on :{HTTP_PORT}/healthz")
        httpd = http.server.HTTPServer(("", HTTP_PORT), HealthHandler)
        httpd.serve_forever()

  # ---------------------------------------------------------------------------
  # entrypoint.sh — launches both processes; kills both if either exits.
  # ---------------------------------------------------------------------------
  entrypoint.sh: |
    #!/bin/sh
    set -e

    # Start the HTTP health server in the background
    python3 /config/server.py &
    SERVER_PID=$!

    # Start the controller loop
    /config/controller.sh &
    CONTROLLER_PID=$!

    # Poll both PIDs; exit (and restart the pod) if either process dies.
    # Using a polling loop instead of 'wait -n' for POSIX sh / busybox compatibility.
    while true; do
      if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
        echo "[entrypoint] HTTP server (PID ${SERVER_PID}) exited — restarting pod"
        kill "${CONTROLLER_PID}" 2>/dev/null || true
        exit 1
      fi
      if ! kill -0 "${CONTROLLER_PID}" 2>/dev/null; then
        echo "[entrypoint] Controller (PID ${CONTROLLER_PID}) exited — restarting pod"
        kill "${SERVER_PID}" 2>/dev/null || true
        exit 1
      fi
      sleep 5
    done
