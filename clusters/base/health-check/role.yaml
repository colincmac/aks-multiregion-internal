# Role to manage Services in the health-check namespace (create/delete api-dns-record)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-check-dns-manager
  namespace: health-check
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Role to read Endpoints in the my-app namespace (verify local backend health)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-check-endpoint-reader
  namespace: my-app
rules:
  - apiGroups: [""]
    resources: ["endpoints", "endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
