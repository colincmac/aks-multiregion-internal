# Role to manage Services in the health-check namespace (create/delete api-dns-record)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-check-dns-manager
  namespace: health-check
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Role to read Endpoints in the my-app namespace (verify local backend health)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-check-endpoint-reader
  namespace: my-app
rules:
  - apiGroups: [""]
    resources: ["endpoints", "endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
# Role to read the Tier-1 AGC Gateway status in tier1-agc namespace.
# Used by the health-check controller to discover the AGC private frontend IP
# (gateway.status.addresses) for DNS targeting and Tier-1 health probing.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: health-check-gateway-reader
  namespace: tier1-agc
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch"]
