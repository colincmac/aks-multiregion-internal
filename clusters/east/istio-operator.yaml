apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: istio-east
  namespace: istio-system
spec:
  meshConfig:
    defaultConfig:
      proxyMetadata:
        ISTIO_META_REQUESTED_NETWORK_VIEW: "network-east"
    localityLbSetting:
      enabled: true
      failover:
        - from: eastus
          to: westus
  values:
    global:
      meshID: shared-mesh
      multiCluster:
        clusterName: cluster-east
      network: network-east
  components:
    ingressGateways:
      - name: istio-ingressgateway
        enabled: true
        k8s:
          serviceAnnotations:
            service.beta.kubernetes.io/azure-load-balancer-internal: "true"
            service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "snet-ilb"
          service:
            type: LoadBalancer
            ports:
              - port: 443
                targetPort: 8443
                name: https
              - port: 15443
                targetPort: 15443
                name: tls
      - name: istio-eastwestgateway
        enabled: true
        label:
          istio: eastwestgateway
          topology.istio.io/network: network-east
        k8s:
          serviceAnnotations:
            service.beta.kubernetes.io/azure-load-balancer-internal: "true"
            service.beta.kubernetes.io/azure-load-balancer-internal-subnet: "snet-ilb"
          env:
            - name: ISTIO_META_REQUESTED_NETWORK_VIEW
              value: network-east
          service:
            type: LoadBalancer
            ports:
              - name: tls
                port: 15443
                targetPort: 15443
